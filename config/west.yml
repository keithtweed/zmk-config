manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: keithtweed
      url-base: https://github.com/keithtweed
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
      revision: main
    - name: blank-slate-zmk-module
      url: https://github.com/keithtweed/blank-slate-zmk-module
      revision: main
      path: modules/blank-slate-zmk-module
  self:
    path: config
